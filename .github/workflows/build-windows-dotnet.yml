name: Build Windows EXE (.NET)

# Bouwt de C#/.NET (WPF) versie als self-contained map (geen Python/.NET nodig).
# We publiceren NIET als single-file: Whisper.net laadt zijn native whisper.dll
# uit de runtimes-map, en die wordt bij single-file-uitpakken niet gevonden.
# Handmatig starten kan via tabblad "Actions" -> "Run workflow".

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/offline-tts-note-recorder-lhdro5
    paths:
      - "dotnet/**"
      - ".github/workflows/build-windows-dotnet.yml"

jobs:
  build:
    runs-on: windows-latest

    # Nodig om een GitHub Release te kunnen aanmaken.
    permissions:
      contents: write

    # Code-signing is optioneel: zonder deze secrets slaat het ondertekenen
    # zichzelf over en blijft de build gewoon werken.
    env:
      PFX_B64: ${{ secrets.CODE_SIGN_PFX_BASE64 }}
      PFX_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}
      TIMESTAMP_URL: ${{ vars.CODE_SIGN_TIMESTAMP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: .NET 8 installeren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Herstellen & publiceren
        working-directory: dotnet/Notulen
        run: >
          dotnet publish -c Release -r win-x64 --self-contained true
          -o publish

      - name: Scriba.exe ondertekenen (optioneel)
        run: pwsh dotnet/installer/sign.ps1 -Path dotnet/Notulen/publish/Scriba.exe

      - name: App uploaden als artefact (ZIP-map)
        uses: actions/upload-artifact@v4
        with:
          name: scriba-app
          path: dotnet/Notulen/publish/**
          if-no-files-found: error

      - name: Inno Setup installeren
        run: choco install innosetup -y --no-progress

      - name: Installer bouwen
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" dotnet\installer\notulen.iss'

      - name: Installer ondertekenen (optioneel)
        run: pwsh dotnet/installer/sign.ps1 -Path dotnet/installer/Output/Scriba-Setup.exe

      - name: Installer uploaden als artefact
        uses: actions/upload-artifact@v4
        with:
          name: scriba-installer
          path: dotnet/installer/Output/Scriba-Setup.exe
          if-no-files-found: error

      # Alleen op main: een Release met één-klik downloadlink (installer).
      - name: App-map inpakken voor de Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: Compress-Archive -Path dotnet/Notulen/publish/* -DestinationPath Scriba-app.zip

      - name: GitHub Release publiceren
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Scriba v1.0.${{ github.run_number }}
          body: |
            Automatische build van Scriba.

            **Downloaden:** `Scriba-Setup.exe` (installer) of `Scriba-app.zip` (uitpakken en `Scriba.exe` starten).

            Niet ondertekend: bij de eerste start kan Windows SmartScreen waarschuwen → *Meer info → Toch uitvoeren*.
          files: |
            dotnet/installer/Output/Scriba-Setup.exe
            Scriba-app.zip
          make_latest: true
